name: "Lampac"
version: "1.0.0"
slug: "lampac"
description: "Lampac – прокси-сервер для стриминга медиа"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "application"
boot: "auto"
host_network: true
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Веб-интерфейс"
options:
  root_password: "changeme"
  web_port: 8080
schema:
  root_password: str
  web_port: int(1,65535)
map:
  - "config:rw"
  - "share:rw"
